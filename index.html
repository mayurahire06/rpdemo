<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHE Fraud Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white">

<div class="max-w-4xl mx-auto px-6 py-12">
    <h1 class="text-5xl font-bold text-center mb-2">AHE Fraud Detection</h1>
    <p class="text-center text-blue-400 mb-12">Adaptive Hybrid Ensemble Model</p>

    <!-- Status Check -->
    <div id="statusCheck" class="bg-yellow-500/20 border border-yellow-500 rounded-2xl p-4 mb-8 text-center">
        ⏳ Checking backend connection...
    </div>

    <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8">
        <h2 class="text-2xl font-semibold mb-6">Enter Transaction Details</h2>
        
        <div class="grid grid-cols-2 gap-6">
            <!-- Amount Input -->
            <div>
                <label class="block text-sm mb-2">Purchase Amount (₹)</label>
                <input id="amt" type="number" value="150.00" step="0.01" min="0"
                       class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 text-white focus:border-blue-500 outline-none">
            </div>
            
            <!-- Category Select -->
            <div>
                <label class="block text-sm mb-2">Category</label>
                <select id="category" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 focus:border-blue-500 outline-none">
                    <option value="">⏳ Loading categories...</option>
                </select>
            </div>

            <!-- Gender Select -->
            <div>
                <label class="block text-sm mb-2">Gender</label>
                <select id="gender" class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 focus:border-blue-500 outline-none">
                    <option value="">⏳ Loading genders...</option>
                </select>
            </div>

            <!-- State Input -->
            <div>
                <label class="block text-sm mb-2">State (2 letters)</label>
                <input id="state" value="" maxlength="2" placeholder="TX"
                       class="w-full bg-gray-900 border border-gray-700 rounded-2xl px-5 py-4 text-white uppercase focus:border-blue-500 outline-none">
            </div>
        </div>

        <button id="predictBtn" onclick="predict()" disabled
                class="mt-8 w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 disabled:cursor-not-allowed py-5 rounded-3xl text-lg font-semibold transition">
            Predict with AHE Model
        </button>
    </div>

    <!-- Result Section -->
    <div id="result" class="hidden mt-8 bg-white/10 backdrop-blur-xl rounded-3xl p-8">
        <div id="status" class="text-6xl font-bold py-8 rounded-2xl text-center"></div>
        <p id="probText" class="text-6xl font-bold py-8 rounded-2xl text-center"></p>
        <div id="details" class="mt-6 grid grid-cols-3 gap-4 text-center text-sm">
            <div class="bg-white/5 rounded-lg p-3">
                <p class="text-gray-400">Amount</p>
                <p id="detailAmt" class="font-semibold"></p>
            </div>
            <div class="bg-white/5 rounded-lg p-3">
                <p class="text-gray-400">Category</p>
                <p id="detailCat" class="font-semibold"></p>
            </div>
            <div class="bg-white/5 rounded-lg p-3">
                <p class="text-gray-400">State</p>
                <p id="detailState" class="font-semibold"></p>
            </div>
        </div>
    </div>

    <!-- Error Section -->
    <div id="errorSection" class="hidden mt-8 bg-red-500/20 border border-red-500 rounded-3xl p-8">
        <p class="text-red-400 text-center"><i class="fas fa-exclamation-triangle mr-2"></i></p>
        <p id="errorText" class="text-red-300 text-center mt-2"></p>
    </div>
</div>

<script>
    let validCategories = [];
    let validGenders = [];
    let validStates = [];

    // ==================== LOAD VALID VALUES ====================
    async function initializeForm() {
        try {
            const response = await fetch('http://127.0.0.1:8000/health');
            if (!response.ok) throw new Error(`Health check failed: ${response.status}`);
            
            const data = await response.json();
            validCategories = data.valid_categories;
            validGenders = data.valid_genders;
            validStates = data.valid_states;

            // Populate dropdowns
            populateDropdown('category', validCategories);
            populateDropdown('gender', validGenders);

            // Update status
             document.getElementById('statusCheck').innerHTML = '✅ Backend connected! Ready to predict.';
             document.getElementById('statusCheck').className = 'bg-green-500/20 border border-green-500 rounded-2xl p-4 mb-8 text-center';
            document.getElementById('predictBtn').disabled = false;

            console.log('✅ Form initialized with valid values');
            console.log('Categories:', validCategories);
            console.log('Genders:', validGenders);
            console.log('States:', validStates);

        } catch (err) {
            console.error('❌ Failed to load valid values:', err);
             document.getElementById('statusCheck').innerHTML = `❌ Backend not responding: ${err.message}<br>Make sure FastAPI is running on http://127.0.0.1:8000`;
             document.getElementById('statusCheck').className = 'bg-red-500/20 border border-red-500 rounded-2xl p-4 mb-8 text-center';
        }
    }

    function populateDropdown(elementId, values) {
        const select = document.getElementById(elementId);
        select.innerHTML = '';
        values.forEach(value => {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = value;
            select.appendChild(option);
        });
    }

    // ==================== PREDICT FUNCTION ====================
    async function predict() {
        const errorSection = document.getElementById('errorSection');
        const errorText = document.getElementById('errorText');
        errorSection.classList.add('hidden');
        errorText.textContent = '';

        const amt = parseFloat(document.getElementById('amt').value);
        const category = document.getElementById('category').value;
        const gender = document.getElementById('gender').value;
        const state = document.getElementById('state').value.toUpperCase().trim();

        // Basic validation
        if (!amt || amt <= 0) {
            showError('❌ Please enter a valid amount');
            return;
        }
        if (!category) {
            showError('❌ Please select a category');
            return;
        }
        if (!gender) {
            showError('❌ Please select a gender');
            return;
        }
        if (!state || state.length !== 2) {
            showError('❌ Please enter a 2-letter state code');
            return;
        }

        const payload = {
            amt: amt,
            category: category,
            gender: gender,
            state: state
        };

        console.log("📤 Sending payload:", payload);

        try {
            const res = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            console.log("📥 Response:", data);

            if (!res.ok) {
                showError(`❌ ${data.detail || 'Prediction failed'}`);
                return;
            }

            // Show result
            displayResult(data, payload);

        } catch (err) {
            console.error('❌ Network Error:', err);
            showError(`❌ Connection failed: ${err.message}<br>Ensure FastAPI is running on http://127.0.0.1:8000`);
        }
    }

    function displayResult(data, payload) {
        const resultDiv = document.getElementById('result');
        const status = document.getElementById('status');
        const probText = document.getElementById('probText');

        resultDiv.classList.remove('hidden');

        if (data.is_fraud) {
            status.innerHTML = '🚨 FRAUD DETECTED';
            // status.innerHTML = ' ';
            status.style.backgroundColor = '#b91c1c';
        } else {
            status.innerHTML = '✅ LEGITIMATE';
            // status.innerHTML = ' ';
            status.style.backgroundColor = '#15803d';
        }

        probText.textContent = `Fraud Probability: ${(data.fraud_probability * 100).toFixed(2)}%`;
        
        // Show details
        document.getElementById('detailAmt').textContent = `₹${payload.amt.toFixed(2)}`;
        document.getElementById('detailCat').textContent = payload.category;
        document.getElementById('detailState').textContent = payload.state;
    }

    function showError(message) {
        const errorSection = document.getElementById('errorSection');
        const errorText = document.getElementById('errorText');
        errorText.innerHTML = message;
        errorSection.classList.remove('hidden');
    }

    // ==================== INITIALIZE ON PAGE LOAD ====================
    window.addEventListener('load', initializeForm);
</script>
</body>
</html>
